<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cnation-china (보안강화 듀얼번역기)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans max-w-md mx-auto relative overflow-hidden">

    <div class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center shrink-0">
        <h1 class="text-lg font-bold"><i class="fas fa-bolt mr-2 text-yellow-300"></i>즉석 번역기</h1>
        <div id="engineBadge" onclick="toggleEngine()"
            class="cursor-pointer text-[10px] bg-blue-800 px-3 py-1.5 rounded-full font-black border border-blue-400 active:scale-95 transition">
            <i class="fas fa-sync-alt mr-1"></i> DEEPSEEK 모드
        </div>
    </div>

    <div class="flex-1 bg-white p-6 flex flex-col items-center justify-center relative overflow-y-auto">
        <p id="cnation-chineseOutput"
            class="text-[2.5rem] leading-tight font-black text-gray-800 text-center break-words w-full">
            <span class="text-gray-300 text-base font-normal">데이터를 불러오는 중...</span>
        </p>
        <button id="cnation-playBtn" onclick="cnation_speakChinese()"
            class="hidden mt-6 px-6 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-full font-bold text-sm shadow-sm active:scale-95">
            <i class="fas fa-volume-up mr-2"></i>발음 듣기
        </button>
        <div id="cnation-loading"
            class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-20">
            <i class="fas fa-spinner fa-spin text-5xl text-blue-500 mb-3"></i>
            <span class="text-blue-500 font-bold">번역 중...</span>
        </div>
    </div>

    <div class="bg-gray-50 border-t border-gray-200 p-4 shadow-lg z-10 shrink-0">
        <textarea id="cnation-koreanInput" rows="3"
            class="w-full bg-white border border-gray-300 rounded-xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-3"
            placeholder="여기에 한국어 입력..."></textarea>
        <div class="flex gap-2">
            <button onclick="cnation_clearText()"
                class="w-1/4 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-sm flex flex-col items-center justify-center"><i
                    class="fas fa-trash-alt mb-1"></i>지우기</button>
            <button onclick="cnation_translateText()"
                class="w-2/4 py-3 bg-blue-600 text-white rounded-xl font-bold text-base flex flex-col items-center justify-center shadow-md"><i
                    class="fas fa-exchange-alt mb-1"></i>변환하기</button>
            <button onclick="cnation_openHistory()"
                class="w-1/4 py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm flex flex-col items-center justify-center shadow-md"><i
                    class="fas fa-history mb-1"></i>기록</button>
        </div>
    </div>

    <div id="cnation-historyModal" class="fixed inset-0 bg-black/60 hidden flex-col justify-end z-50">
        <div class="bg-white w-full h-[85vh] rounded-t-3xl shadow-2xl flex flex-col animate-slide-up">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-3xl">
                <h2 class="font-bold text-lg text-gray-800">과거 대화 기록</h2>
                <div class="flex gap-2">
                    <button onclick="cnation_deleteAllHistory()"
                        class="text-red-500 text-xs font-bold bg-red-50 px-2 py-1 rounded">전체삭제</button>
                    <button onclick="cnation_closeHistory()"
                        class="text-gray-400 text-3xl px-2 leading-none">&times;</button>
                </div>
            </div>
            <div id="cnation-historyList" class="flex-1 overflow-y-auto p-4 bg-gray-100 space-y-4"></div>
        </div>
    </div>

    <script type="module">
        // 🔑 Supabase 설정
        const SUPABASE_URL = 'https://nydnthkqvpajufbycxjq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LWqTdLhSkspLke1HvFsmVA_KOYnGGaY';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const keyTableName = 'cnation_api_keys';
        const historyTableName = 'cnation_translation_history';

        let KEYS = { DeepSeek: "", Qwen: "" };
        let currentEngine = "DeepSeek";

        // ★ 앱 시작 시 DB에서 키 불러오기
        async function fetchApiKeys() {
            const { data, error } = await _supabase.from(keyTableName).select('engine_name, api_key');
            if (data) {
                data.forEach(item => { KEYS[item.engine_name] = item.api_key; });
                document.getElementById('cnation-chineseOutput').innerHTML = '<span class="text-gray-300 text-base font-normal">엔진 준비 완료!<br>한국어를 입력하세요.</span>';
            } else {
                alert("API 키를 불러오지 못했습니다.");
            }
        }
        fetchApiKeys();

        // 엔진 전환
        window.toggleEngine = () => {
            currentEngine = (currentEngine === "DeepSeek") ? "Qwen" : "DeepSeek";
            const badge = document.getElementById('engineBadge');
            badge.innerHTML = `<i class="fas fa-sync-alt mr-1"></i> ${currentEngine.toUpperCase()} 모드`;
            badge.className = `cursor-pointer text-[10px] ${currentEngine === "DeepSeek" ? 'bg-blue-800' : 'bg-orange-600'} px-3 py-1.5 rounded-full font-black border border-white/30 active:scale-95 transition`;
        };

        // 음성 읽기
        window.cnation_speakChinese = () => {
            const text = document.getElementById('cnation-chineseOutput').innerText;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.7;
                const voices = window.speechSynthesis.getVoices();
                utterance.voice = voices.find(v => v.lang.includes('zh')) || voices[0];
                window.speechSynthesis.speak(utterance);
            }
        };

        // 번역 로직
        window.cnation_translateText = async () => {
            const input = document.getElementById('cnation-koreanInput').value.trim();
            if (!input) return alert("입력하세요!");
            if (!KEYS[currentEngine]) return alert("엔진 준비중입니다.");

            document.getElementById('cnation-loading').classList.remove('hidden');

            const config = currentEngine === "DeepSeek"
                ? { url: "https://api.deepseek.com/chat/completions", model: "deepseek-chat", key: KEYS.DeepSeek }
                : { url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", model: "qwen-plus", key: KEYS.Qwen };

            try {
                const res = await fetch(config.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [{ role: "system", content: "너는 최고의 통역사야. 중국어만 딱 출력해." }, { role: "user", content: input }],
                        temperature: 0.3
                    })
                });
                const data = await res.json();
                let result = data.choices[0].message.content.replace(/^\[?중국어\]?\s*:\s*/, '').trim();

                document.getElementById('cnation-chineseOutput').innerText = result;
                document.getElementById('cnation-playBtn').classList.remove('hidden');

                await _supabase.from(historyTableName).insert([{ korean_text: input, chinese_text: result }]);
            } catch (err) { alert("번역 오류!"); }
            document.getElementById('cnation-loading').classList.add('hidden');
        };

        // 클리어 및 히스토리 관리 (생략 가능, 이전과 동일)
        window.cnation_clearText = () => {
            document.getElementById('cnation-koreanInput').value = '';
            document.getElementById('cnation-chineseOutput').innerHTML = '<span class="text-gray-300 text-base font-normal">한국어를 입력하고<br>변환 버튼을 누르세요.</span>';
            document.getElementById('cnation-playBtn').classList.add('hidden');
        };
        window.cnation_openHistory = () => { document.getElementById('cnation-historyModal').classList.remove('hidden'); /* loadHistory 로직 */ };
        window.cnation_closeHistory = () => { document.getElementById('cnation-historyModal').classList.add('hidden'); };
    </script>
</body>

</html>
