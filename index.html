<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cnation-china (초고속 번역기)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-100 h-[100dvh] flex flex-col font-sans max-w-md mx-auto relative overflow-hidden">

    <div class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <h1 class="text-lg font-bold"><i class="fas fa-bolt mr-2 text-yellow-300"></i>즉석 소통 번역기</h1>
        <span class="text-xs bg-blue-800 px-2 py-1 rounded-full font-bold">DeepSeek 엔진</span>
    </div>

    <div class="flex-1 bg-white p-6 flex flex-col items-center justify-center relative overflow-y-auto">
        <p id="cnation-chineseOutput"
            class="text-[2.5rem] leading-tight font-black text-gray-800 text-center break-words w-full">
            <span class="text-gray-300 text-base font-normal">한국어를 입력하고<br>변환 버튼을 누르세요.</span>
        </p>

        <button id="cnation-playBtn" onclick="cnation_speakChinese()"
            class="hidden mt-6 px-6 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-full font-bold text-sm shadow-sm hover:bg-blue-100 transition active:scale-95">
            <i class="fas fa-volume-up text-lg mr-2"></i>발음 듣기
        </button>

        <div id="cnation-loading"
            class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-20">
            <i class="fas fa-spinner fa-spin text-5xl text-blue-500 mb-3"></i>
            <span class="text-blue-500 font-bold">번역 중...</span>
        </div>
    </div>

    <div class="bg-gray-50 border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-10 shrink-0">
        <textarea id="cnation-koreanInput" rows="3"
            class="w-full bg-white border border-gray-300 rounded-xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none shadow-inner mb-3"
            placeholder="여기에 한국어 문장을 입력하세요..."></textarea>

        <div class="flex gap-2">
            <button onclick="cnation_clearText()"
                class="w-1/4 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition text-sm flex flex-col items-center justify-center">
                <i class="fas fa-trash-alt mb-1"></i>지우기
            </button>
            <button onclick="cnation_translateText()"
                class="w-2/4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-md text-base flex flex-col items-center justify-center">
                <i class="fas fa-exchange-alt mb-1"></i>중국어로 변환
            </button>
            <button onclick="cnation_openHistory()"
                class="w-1/4 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition shadow-md text-sm flex flex-col items-center justify-center">
                <i class="fas fa-history mb-1"></i>기존대화
            </button>
        </div>
    </div>

    <div id="cnation-historyModal" class="fixed inset-0 bg-black/60 hidden flex-col justify-end z-50">
        <div class="bg-white w-full h-[85vh] rounded-t-3xl shadow-2xl flex flex-col animate-slide-up">

            <div class="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-3xl">
                <h2 class="font-bold text-lg text-gray-800"><i class="fas fa-history text-indigo-500 mr-2"></i>과거 대화 기록
                </h2>
                <div class="flex items-center gap-2">
                    <button onclick="cnation_deleteAllHistory()"
                        class="bg-red-100 text-red-600 hover:bg-red-200 font-bold text-xs px-3 py-1.5 rounded-lg transition active:scale-95">
                        <i class="fas fa-trash-alt mr-1"></i>전체삭제
                    </button>
                    <button onclick="cnation_closeHistory()"
                        class="text-gray-400 hover:text-gray-800 text-3xl px-2 leading-none">&times;</button>
                </div>
            </div>

            <div id="cnation-historyList" class="flex-1 overflow-y-auto p-4 bg-gray-100 space-y-5">
            </div>

            <div class="p-4 border-t bg-white">
                <button id="loadAllBtn" onclick="cnation_loadHistory(true)"
                    class="w-full py-3.5 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition text-sm">
                    그동안의 전체 대화 모두 보기 ⬇️
                </button>
            </div>
        </div>
    </div>

    <script>
        // 🔑 API 키 및 Supabase 기본 설정
        const cnation_API_KEY = "sk-a11a347ec137483ab0f6b0fefb8bf392";

        const SUPABASE_URL = 'https://nydnthkqvpajufbycxjq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LWqTdLhSkspLke1HvFsmVA_KOYnGGaY';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const tableName = 'cnation_translation_history';

        // ★ 기기의 음성(Voice) 목록을 미리 로드해두는 로직
        let availableVoices = [];
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }

        // ==========================================
        // ★ 0. 중국어 음성 읽기 (TTS) 기능 
        // ==========================================
        function cnation_speakChinese() {
            const text = document.getElementById('cnation-chineseOutput').innerText;
            if (text.includes('한국어를 입력하고')) return;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';

                // ★ 핵심 수정: 기존 0.85에서 0.7로 속도를 확 늦춰서 또박또박 명확하게 읽도록 수정했습니다!
                utterance.rate = 0.7;

                const voices = window.speechSynthesis.getVoices();
                const zhVoice = voices.find(voice => voice.lang.includes('zh') || voice.name.toLowerCase().includes('chinese'));

                if (zhVoice) {
                    utterance.voice = zhVoice;
                } else {
                    console.warn("전용 중국어 음성팩을 찾을 수 없어 기본 엔진으로 시도합니다.");
                }

                window.speechSynthesis.speak(utterance);
            } else {
                alert('현재 사용 중인 기기에서는 음성 읽기 기능을 지원하지 않습니다.');
            }
        }

        // ==========================================
        // 1. 번역 및 저장 로직
        // ==========================================
        async function cnation_translateText() {
            const input = document.getElementById('cnation-koreanInput').value.trim();
            if (!input) {
                alert("한국어 문장을 먼저 입력해주세요!");
                return;
            }

            document.getElementById('cnation-loading').classList.remove('hidden');

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${cnation_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { role: "system", content: "너는 중국에서 한국인의 소통을 돕는 전문 통역사야. 입력된 한국어를 가장 자연스러운 중국어 간체로 번역해줘. 주의: '[중국어]:' 같은 접두사나 부연 설명, 인사말, 병음은 절대 쓰지 말고 오직 번역된 중국어 텍스트만 단독으로 출력해." },
                            { role: "user", content: input }
                        ],
                        temperature: 0.3
                    })
                });

                if (!response.ok) throw new Error("DeepSeek 통신 오류");

                const data = await response.json();
                let translatedText = data.choices[0].message.content.replace(/^["']|["']$/g, '').trim();
                translatedText = translatedText.replace(/^\[?중국어\]?\s*:\s*/, '');

                const outputEl = document.getElementById('cnation-chineseOutput');
                outputEl.innerHTML = translatedText;
                outputEl.classList.remove('text-gray-300', 'text-base', 'font-normal');

                document.getElementById('cnation-playBtn').classList.remove('hidden');

                // 번역 기록 DB 저장
                await _supabase.from(tableName).insert([{
                    korean_text: input,
                    chinese_text: translatedText
                }]);

            } catch (error) {
                alert('번역 실패! 원인:\n' + error.message);
            } finally {
                document.getElementById('cnation-loading').classList.add('hidden');
            }
        }

        function cnation_clearText() {
            document.getElementById('cnation-koreanInput').value = '';
            const outputEl = document.getElementById('cnation-chineseOutput');
            outputEl.innerHTML = '<span class="text-gray-300 text-base font-normal">한국어를 입력하고<br>변환 버튼을 누르세요.</span>';

            document.getElementById('cnation-playBtn').classList.add('hidden');
            document.getElementById('cnation-koreanInput').focus();
        }

        // ==========================================
        // 2. 과거 대화 (히스토리) 로직
        // ==========================================
        function cnation_openHistory() {
            document.getElementById('cnation-historyModal').classList.remove('hidden');
            document.getElementById('cnation-historyModal').classList.add('flex');
            cnation_loadHistory(false);
        }

        function cnation_closeHistory() {
            document.getElementById('cnation-historyModal').classList.add('hidden');
            document.getElementById('cnation-historyModal').classList.remove('flex');
        }

        window.reuseHistory = (kor, chi) => {
            document.getElementById('cnation-koreanInput').value = kor;
            const outputEl = document.getElementById('cnation-chineseOutput');
            outputEl.innerHTML = chi;
            outputEl.classList.remove('text-gray-300', 'text-base', 'font-normal');

            document.getElementById('cnation-playBtn').classList.remove('hidden');
            cnation_closeHistory();
        }

        async function cnation_loadHistory(loadAll) {
            const listDiv = document.getElementById('cnation-historyList');
            const loadAllBtn = document.getElementById('loadAllBtn');

            listDiv.innerHTML = '<p class="text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin mr-2"></i>기록을 불러오는 중...</p>';

            try {
                let query = _supabase.from(tableName).select('*').order('created_at', { ascending: false });
                if (!loadAll) {
                    query = query.limit(10);
                    loadAllBtn.classList.remove('hidden');
                } else {
                    query = query.limit(500);
                    loadAllBtn.classList.add('hidden');
                }

                const { data, error } = await query;
                if (error) throw error;

                if (!data || data.length === 0) {
                    listDiv.innerHTML = '<p class="text-center text-gray-400 py-10">과거 대화 기록이 없습니다.</p>';
                    return;
                }

                const groupedData = {};
                data.forEach(item => {
                    const d = new Date(item.created_at);
                    const dateString = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
                    if (!groupedData[dateString]) groupedData[dateString] = [];
                    groupedData[dateString].push(item);
                });

                let html = '';
                for (const [date, items] of Object.entries(groupedData)) {
                    html += `<div class="mb-2"><span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full">${date}</span></div>`;
                    html += `<div class="space-y-3 mb-6">`;
                    items.forEach(item => {
                        html += `
                            <div onclick="reuseHistory('${item.korean_text.replace(/'/g, "\\'")}', '${item.chinese_text.replace(/'/g, "\\'")}')" 
                                 class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 cursor-pointer hover:border-indigo-400 active:scale-[0.98] transition">
                                <p class="text-xs text-gray-500 font-medium mb-1 line-clamp-1">${item.korean_text}</p>
                                <p class="text-lg font-bold text-gray-800 leading-tight">${item.chinese_text}</p>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                listDiv.innerHTML = html;

            } catch (err) {
                console.error(err);
                listDiv.innerHTML = '<p class="text-center text-red-500 py-10">데이터를 불러오지 못했습니다.</p>';
            }
        }

        async function cnation_deleteAllHistory() {
            const isConfirm = confirm("정말 모든 대화 기록을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.");

            if (isConfirm) {
                try {
                    const { error } = await _supabase
                        .from(tableName)
                        .delete()
                        .neq('id', 0);

                    if (error) throw error;

                    alert("모든 기록이 깔끔하게 삭제되었습니다! 🗑️");
                    cnation_loadHistory(false);

                } catch (error) {
                    console.error("전체 삭제 오류:", error);
                    alert("삭제 실패: " + error.message);
                }
            }
        }
    </script>
</body>

</html>
