<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cnation-china (초고속 번역기)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans max-w-md mx-auto relative overflow-hidden">

    <div class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-lg font-bold"><i class="fas fa-bolt mr-2 text-yellow-300"></i>즉석 소통 번역기</h1>
        <span class="text-xs bg-blue-800 px-2 py-1 rounded-full font-bold">DeepSeek 엔진</span>
    </div>

    <div class="flex-1 bg-white p-6 flex items-center justify-center relative overflow-y-auto">
        <p id="cnation-chineseOutput"
            class="text-[2.5rem] leading-tight font-black text-gray-800 text-center break-words w-full">
            <span class="text-gray-300 text-base font-normal">한국어를 입력하고<br>번역 버튼을 누르세요.</span>
        </p>

        <div id="cnation-loading"
            class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-20">
            <i class="fas fa-spinner fa-spin text-5xl text-blue-500 mb-3"></i>
            <span class="text-blue-500 font-bold">번역 중...</span>
        </div>
    </div>

    <div class="bg-gray-50 border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-10">
        <textarea id="cnation-koreanInput" rows="3"
            class="w-full bg-white border border-gray-300 rounded-xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none shadow-inner mb-3"
            placeholder="여기에 한국어 문장을 입력하세요..."></textarea>

        <div class="flex gap-3">
            <button onclick="cnation_clearText()"
                class="w-1/3 py-3.5 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition text-lg">
                <i class="fas fa-trash-alt mr-1"></i> 지우기
            </button>
            <button onclick="cnation_translateText()"
                class="w-2/3 py-3.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-md text-lg flex items-center justify-center gap-2">
                <i class="fas fa-exchange-alt"></i> 중국어로 변환
            </button>
        </div>
    </div>

    <script>
        // 🚨 주의: 발급받으신 DeepSeek API 키를 아래에 넣어주세요!
        const cnation_API_KEY = "sk-a11a347ec137483ab0f6b0fefb8bf392";

        async function cnation_translateText() {
            const input = document.getElementById('cnation-koreanInput').value.trim();
            if (!input) {
                alert("한국어 문장을 먼저 입력해주세요!");
                return;
            }

            // 로딩 화면 표시
            document.getElementById('cnation-loading').classList.remove('hidden');

            try {
                // DeepSeek API 호출 (OpenAI 규격과 동일)
                const apiUrl = "https://api.deepseek.com/chat/completions";

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${cnation_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", // 딥시크 텍스트 모델
                        messages: [
                            {
                                role: "system",
                                content: "너는 중국에서 한국인의 소통을 돕는 전문 통역사야. 사용자가 입력하는 한국어 문장을 중국인과의 일상 대화에서 가장 자연스럽게 쓰이는 중국어 간체(Simplified Chinese)로 번역해줘. 부연 설명, 인사말, 병음(Pinyin)은 절대 쓰지 말고 오직 번역된 중국어 문장만 출력해."
                            },
                            {
                                role: "user",
                                content: `[한국어]: ${input}`
                            }
                        ],
                        temperature: 0.3 // 번역의 정확도를 높이기 위해 창의성 수치를 낮춤
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(`[에러코드 ${response.status}] ${errData.error?.message || '알 수 없는 오류'}`);
                }

                const data = await response.json();
                const translatedText = data.choices[0].message.content;

                // 번역 결과 화면에 표시 (따옴표 등 불필요한 기호 제거)
                const outputEl = document.getElementById('cnation-chineseOutput');
                outputEl.innerHTML = translatedText.replace(/^["']|["']$/g, '');
                outputEl.classList.remove('text-gray-300', 'text-base', 'font-normal');

            } catch (error) {
                alert('번역 실패! 원인:\n' + error.message);
                console.error("상세 에러 내용:", error);
            } finally {
                // 로딩 화면 숨기기
                document.getElementById('cnation-loading').classList.add('hidden');
            }
        }

        function cnation_clearText() {
            document.getElementById('cnation-koreanInput').value = '';
            const outputEl = document.getElementById('cnation-chineseOutput');
            outputEl.innerHTML = '<span class="text-gray-300 text-base font-normal">한국어를 입력하고<br>번역 버튼을 누르세요.</span>';
            document.getElementById('cnation-koreanInput').focus();
        }
    </script>
</body>

</html>
