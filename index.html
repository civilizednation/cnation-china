<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>즉석 소통 번역기</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans max-w-md mx-auto relative overflow-hidden">

    <div class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-lg font-bold"><i class="fas fa-language mr-2"></i>소통 번역기</h1>
        <span class="text-xs bg-blue-800 px-2 py-1 rounded-full">🇨🇳 중국 일상용</span>
    </div>

    <div class="flex-1 bg-white p-6 flex items-center justify-center relative overflow-y-auto">
        <p id="chineseOutput"
            class="text-[2.5rem] leading-tight font-black text-gray-800 text-center break-words w-full">
            <span class="text-gray-300 text-base font-normal">한국어를 입력하고<br>번역 버튼을 누르세요.</span>
        </p>

        <div id="loading" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-20">
            <i class="fas fa-spinner fa-spin text-5xl text-blue-500 mb-3"></i>
            <span class="text-blue-500 font-bold">번역 중...</span>
        </div>
    </div>

    <div class="bg-gray-50 border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-10">
        <textarea id="koreanInput" rows="3"
            class="w-full bg-white border border-gray-300 rounded-xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none shadow-inner mb-3"
            placeholder="여기에 한국어 문장을 입력하세요..."></textarea>

        <div class="flex gap-3">
            <button onclick="clearText()"
                class="w-1/3 py-3.5 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition text-lg">
                <i class="fas fa-trash-alt mr-1"></i> 지우기
            </button>
            <button onclick="translateText()"
                class="w-2/3 py-3.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-md text-lg flex items-center justify-center gap-2">
                <i class="fas fa-exchange-alt"></i> 번역해서 보여주기
            </button>
        </div>
    </div>

    <script>
        // 🚨 주의: 아래 큰따옴표 안에 발급받으신 Gemini API 키를 넣어주세요!
        const API_KEY = "AIzaSyDCVDaS7ItMYZegasw28v_8op8jRopLhv8";

        async function translateText() {
            const input = document.getElementById('koreanInput').value.trim();
            if (!input) {
                alert("한국어 문장을 먼저 입력해주세요!");
                return;
            }

            // 로딩 화면 표시
            document.getElementById('loading').classList.remove('hidden');

            // 💡 프롬프트 엔지니어링: 일상적이고 자연스러운 중국어로 유도
            const prompt = `너는 중국에서 한국인의 소통을 돕는 전문 통역사야. 다음 한국어 문장을 중국인과의 일상 대화에서 가장 자연스럽고 범용적으로 쓰이는 중국어 간체(Simplified Chinese)로 번역해줘. 부연 설명이나 병음(Pinyin)은 절대 쓰지 말고 오직 번역된 중국어 문장만 결과로 출력해.\n\n[한국어]: ${input}`;

            try {
                // Gemini API 호출 (빠른 응답을 위해 gemini-1.5-flash 모델 사용)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) throw new Error('API 호출 실패');

                const data = await response.json();
                const translatedText = data.candidates[0].content.parts[0].text;

                // 번역 결과 화면에 표시
                const outputEl = document.getElementById('chineseOutput');
                outputEl.innerHTML = translatedText;
                outputEl.classList.remove('text-gray-300', 'text-base', 'font-normal');

            } catch (error) {
                alert('번역 중 오류가 발생했습니다. API 키나 인터넷 연결을 확인해주세요.');
                console.error(error);
            } finally {
                // 로딩 화면 숨기기
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function clearText() {
            document.getElementById('koreanInput').value = '';
            const outputEl = document.getElementById('chineseOutput');
            outputEl.innerHTML = '<span class="text-gray-300 text-base font-normal">한국어를 입력하고<br>번역 버튼을 누르세요.</span>';
            document.getElementById('koreanInput').focus();
        }
    </script>
</body>

</html>
